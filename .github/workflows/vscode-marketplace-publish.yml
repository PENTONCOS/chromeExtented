name: Publish VS Code Extension (Codex Balance Monitor)

on:
  workflow_dispatch:
  push:
    tags:
      - "codex-balance-monitor-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/codex-balance-monitor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plugins/codex-balance-monitor/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build extension
        run: npm run compile

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --pat "${{ secrets.VSCE_PAT }}"
